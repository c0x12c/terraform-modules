version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  # publish_module.py deps (registry-register.yml first-time registrations)
  - package-ecosystem: pip
    directory: /set-up-repositories
    schedule:
      interval: monthly
    groups:
      pip:
        patterns:
          - "*"

  # R2 dual-publish deps (boto3) for the self-hosted registry
  - package-ecosystem: pip
    directory: /tools/registry
    schedule:
      interval: monthly
    groups:
      pip:
        patterns:
          - "*"
