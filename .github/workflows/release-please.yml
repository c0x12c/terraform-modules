# Per-module releases from the monorepo via release-please (manifest mode).
#
# Each terraform-* folder is an independent component (see
# release-please-config.json). Tags are <module>/vX.Y.Z; versions are tracked
# in .release-please-manifest.json.
#
# NOTE: manual trigger only until the monorepo cutover (squash-import of module
# folders) lands. The folders are still git submodules; running release-please
# on gitlink-only changes would produce meaningless release PRs. Switch the
# trigger to `push: branches: [master]` as part of the cutover.
name: Release Please

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'c0x12c'
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v3
        id: github-app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.github-app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
