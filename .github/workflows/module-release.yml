# Per-module releases from the monorepo via module-release.yml and follow-on
# registry-publish.yml mirror jobs.
#
# Each terraform-* folder is an independent component (see
# module-release-config.json). Tags are <module>/vX.Y.Z; versions are tracked
# in .module-versions.json.
#
name: Module Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

# Must be a superset of the called registry-publish.yml permissions
# (contents: read, issues: write) — callers cap reusable-workflow grants.
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'c0x12c'
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      release_versions: ${{ steps.release-versions.outputs.versions }}
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v3
        id: github-app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.github-app-token.outputs.token }}
          config-file: module-release-config.json
          manifest-file: .module-versions.json

      - name: Collect release versions
        id: release-versions
        env:
          RELEASE_OUTPUTS: ${{ toJSON(steps.release.outputs) }}
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          outputs = json.loads(os.environ["RELEASE_OUTPUTS"])
          versions = {
              key[: -len("--version")]: f"v{value}"
              for key, value in outputs.items()
              if key.endswith("--version") and value
          }
          print(f"versions={json.dumps(versions, separators=(',', ':'))}")
          PY

  mirror:
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.release.outputs.paths_released) }}
    uses: ./.github/workflows/registry-publish.yml
    with:
      module: ${{ matrix.module }}
      version: ${{ fromJSON(needs.release.outputs.release_versions)[matrix.module] }}
    secrets: inherit

  # Bump consuming parents so their next release re-pins this leaf
  # (docs/decisions/2026-06-07-release-cascade.md). Inert until the repo
  # variable CASCADE_ENABLED is 'true'; commits/pushes additionally require
  # CASCADE_EXECUTE='true' — otherwise the run only prints planned bumps.
  cascade:
    needs: release
    if: needs.release.outputs.releases_created == 'true' && vars.CASCADE_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v3
        id: github-app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ steps.github-app-token.outputs.token }}

      - name: Cascade released modules to consuming parents
        env:
          PATHS_RELEASED: ${{ needs.release.outputs.paths_released }}
          RELEASE_VERSIONS: ${{ needs.release.outputs.release_versions }}
          CASCADE_EXECUTE: ${{ vars.CASCADE_EXECUTE }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          exec_flag=""
          if [ "$CASCADE_EXECUTE" = "true" ]; then
            exec_flag="--execute"
          fi
          echo "$PATHS_RELEASED" | python3 -c '
          import json, sys
          for p in json.load(sys.stdin):
              print(p)
          ' | while IFS= read -r module; do
            version="$(python3 -c '
          import json, os, sys
          versions = json.loads(os.environ["RELEASE_VERSIONS"])
          print(versions[sys.argv[1]])
          ' "$module")"
            python3 scripts/cascade_release.py --module "$module" --version "$version" $exec_flag
          done
