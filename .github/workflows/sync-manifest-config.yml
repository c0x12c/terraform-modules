name: Sync config when manifest changes

on:
  push:
    paths:
      - configs/manifest.json
    branches:
      - master

permissions:
  contents: write

jobs:
  sync-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v2
        id: github-app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Install dependencies
        run: |
          brew install yq

      - name: Verify config state across all submodules
        env:
          GH_TOKEN: ${{ steps.github-app-token.outputs.token }}
        run: |
          cd configs
          ./sync-configs.sh --verify --verbose

      - name: Apply updated configurations to submodules
        env:
          GH_TOKEN: ${{ steps.github-app-token.outputs.token }}
        run: |
          cd configs
          ./sync-configs.sh --apply --verbose

      - name: Report sync results
        if: always()
        run: |
          echo "✅ Configuration sync completed"
          echo "Run: configs/sync-configs.sh --verify to check state"
