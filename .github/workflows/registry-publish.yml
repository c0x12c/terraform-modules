name: Registry Publish

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
      version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      module:
        description: "Module directory name, e.g. terraform-aws-msk-kafka-cluster"
        required: true
        type: string
      version:
        description: "Module version tag without the module prefix, e.g. v1.2.0"
        required: true
        type: string
      ref:
        description: "Override checkout ref (e.g. master) for dry-runs; defaults to <module>/<version> tag"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  issues: write

jobs:
  publish:
    if: github.repository_owner == 'c0x12c'
    runs-on: ubuntu-latest
    # Job-level (not workflow-level): top-level concurrency is unreliably honored
    # when a reusable workflow is invoked via workflow_call.
    concurrency:
      group: mirror-${{ inputs.module }}
      cancel-in-progress: false
    steps:
      # No GitHub App token: R2-only publish does not push to any mirror repo,
      # it only reads THIS (monorepo) checkout — the default GITHUB_TOKEN covers
      # same-repo read.
      - name: Checkout monorepo release ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || format('{0}/{1}', inputs.module, inputs.version) }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install R2 publish deps
        run: pip install -r tools/registry/requirements.txt

      - name: Publish module to R2 registry
        env:
          MODULE: ${{ inputs.module }}
          VERSION: ${{ inputs.version }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          python3 scripts/mirror_release.py \
            --module "$MODULE" \
            --version "$VERSION" \
            --r2-bucket "${{ vars.R2_BUCKET }}"

      - name: Open or update registry publish failure issue
        if: failure()
        env:
          # github.token (workflow grants issues:write) creates the alarm issue
          # on THIS repo.
          GH_TOKEN: ${{ github.token }}
          MODULE: ${{ inputs.module }}
          VERSION: ${{ inputs.version }}
          ISSUE_TITLE: "Registry publish failure: ${{ inputs.module }} ${{ inputs.version }}"
        shell: bash
        run: |
          existing_issue="$(gh issue list \
            --state open \
            --label mirror-failure \
            --search "\"$ISSUE_TITLE\" in:title" \
            --json number \
            --jq '.[0].number')"
          body="Registry (R2) publish failed for \`$MODULE\` at \`$VERSION\`.

          Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ -n "$existing_issue" ]; then
            gh issue comment "$existing_issue" --body "$body"
          else
            gh issue create \
              --title "$ISSUE_TITLE" \
              --label mirror-failure \
              --body "$body"
          fi
