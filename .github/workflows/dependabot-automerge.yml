name: Dependabot auto-merge
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v3
        id: github-app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ steps.github-app-token.outputs.token }}"

      - name: Merge GitHub Actions updates
        if: |
          steps.metadata.outputs.package-ecosystem == 'github_actions' &&
          (steps.metadata.outputs.update-type == 'version-update:semver-major' ||
           steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
           steps.metadata.outputs.update-type == 'version-update:semver-patch')
        run: gh pr merge --admin --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.github-app-token.outputs.token }}

      - name: Merge Terraform patch updates
        if: |
          steps.metadata.outputs.package-ecosystem == 'terraform' &&
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --admin --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.github-app-token.outputs.token }}

      # Enhancement: this repo also receives pip updates (boto3 in /tools/registry
      # for the R2 dual-publish registry, and publish_module.py deps in
      # /set-up-repositories). Auto-merge any non-major pip bump. This includes
      # grouped updates and requirement-range widenings, which dependabot reports
      # with an empty update-type (e.g. boto3 "<2,>=1.34" -> ">=1.43.27,<2").
      # Only an explicit semver-major bump is held back for manual review.
      - name: Merge pip non-major updates
        if: |
          steps.metadata.outputs.package-ecosystem == 'pip' &&
          steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --admin --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.github-app-token.outputs.token }}
