name: Sync config for new submodules

on:
  push:
    paths:
      - .gitmodules
    branches:
      - master

permissions:
  contents: write

jobs:
  sync-new-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v2
        id: github-app-token
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Install dependencies
        run: |
          brew install yq

      - name: Initialize new submodules in state
        env:
          GH_TOKEN: ${{ steps.github-app-token.outputs.token }}
        run: |
          cd configs
          ./sync-configs.sh --verify

      - name: Apply all features to newly added submodules
        env:
          GH_TOKEN: ${{ steps.github-app-token.outputs.token }}
        run: |
          cd configs
          ./sync-configs.sh --apply --verbose

      - name: Verify sync completed
        env:
          GH_TOKEN: ${{ steps.github-app-token.outputs.token }}
        run: |
          cd configs
          ./sync-configs.sh --status
