name: Module CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
      any: ${{ steps.detect.outputs.any }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          tmp_modules="$(mktemp)"
          # -d filter: a module deleted in this PR appears in the diff but
          # cannot be checked (nothing to chdir into).
          git diff --name-only "$BASE_SHA...$HEAD_SHA" \
            | awk -F/ '/^terraform-/ {print $1}' \
            | sort -u \
            | while IFS= read -r m; do [ -d "$m" ] && printf '%s\n' "$m" || true; done > "$tmp_modules"

          # Reverse-dependency closure: a sibling consumed via "../<module>"
          # builds from HEAD, so a leaf change must also re-check every
          # consuming parent (transitively), or interface breaks merge green.
          while :; do
            parents="$(mktemp)"
            while IFS= read -r m; do
              grep -rlE "source[[:space:]]*=[[:space:]]*\"\.\./${m}\"" --include='*.tf' . 2>/dev/null || true
            done < "$tmp_modules" \
              | sed 's|^\./||' \
              | awk -F/ '/^terraform-/ {print $1}' \
              | sort -u \
              | while IFS= read -r p; do [ -d "$p" ] && printf '%s\n' "$p" || true; done > "$parents"
            merged="$(mktemp)"
            sort -u "$tmp_modules" "$parents" > "$merged"
            rm -f "$parents"
            if cmp -s "$merged" "$tmp_modules"; then
              rm -f "$merged"
              break
            fi
            mv "$merged" "$tmp_modules"
          done

          python3 - "$tmp_modules" <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import pathlib
          import sys

          modules_path = pathlib.Path(sys.argv[1])
          modules = [
              line
              for line in modules_path.read_text().splitlines()
              if line
          ]
          print(f"modules={json.dumps(modules, separators=(',', ':'))}")
          print(f"any={'true' if modules else 'false'}")
          PY

  check:
    needs: detect
    if: needs.detect.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.detect.outputs.modules) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.10.1

      - name: Check Terraform formatting
        env:
          MODULE: ${{ matrix.module }}
        shell: bash
        run: terraform -chdir="$MODULE" fmt -check -recursive

      - name: Initialize Terraform
        env:
          MODULE: ${{ matrix.module }}
        shell: bash
        run: terraform -chdir="$MODULE" init -backend=false -input=false

      - name: Validate Terraform
        env:
          MODULE: ${{ matrix.module }}
        shell: bash
        run: terraform -chdir="$MODULE" validate -no-color

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v6

      - name: Run TFLint
        env:
          MODULE: ${{ matrix.module }}
        shell: bash
        run: tflint --chdir="$MODULE" --minimum-failure-severity=error

      - name: Check terraform-docs output
        env:
          MODULE: ${{ matrix.module }}
          TERRAFORM_DOCS_VERSION: v0.20.0
          # sha256 of terraform-docs-v0.20.0-linux-amd64.tar.gz from the release's .sha256sum asset
          TERRAFORM_DOCS_SHA256: 34ae01772412bb11474e6718ea62113e38ff5964ee570a98c69fafe3a6dff286
        shell: bash
        run: |
          archive="terraform-docs-${TERRAFORM_DOCS_VERSION}-$(uname | tr '[:upper:]' '[:lower:]')-amd64.tar.gz"
          curl -sSL "https://github.com/terraform-docs/terraform-docs/releases/download/${TERRAFORM_DOCS_VERSION}/${archive}" -o /tmp/terraform-docs.tgz
          echo "${TERRAFORM_DOCS_SHA256}  /tmp/terraform-docs.tgz" | sha256sum -c -
          tar -xzf /tmp/terraform-docs.tgz -C /tmp terraform-docs

          # Guard: a changed module's docs must reflect its current inputs/outputs.
          # No silent skip - adding/changing an input or output variable without
          # regenerating the docs fails the PR. Modules with a .terraform-docs.yml
          # use it; otherwise we require a README.md carrying the inject markers.
          if [ -f "$MODULE/.terraform-docs.yml" ]; then
            if ! /tmp/terraform-docs markdown table --output-check "$MODULE"; then
              echo "::error title=terraform-docs::$MODULE docs are out of date. Regenerate per its .terraform-docs.yml."
              exit 1
            fi
          elif [ -f "$MODULE/README.md" ] && grep -q "BEGIN_TF_DOCS" "$MODULE/README.md"; then
            if ! /tmp/terraform-docs markdown table --output-file README.md --output-mode inject --output-check "$MODULE"; then
              echo "::error title=terraform-docs::$MODULE docs are out of date for a new/changed input or output. Run: terraform-docs markdown table --output-file README.md --output-mode inject $MODULE"
              exit 1
            fi
          else
            echo "::error title=terraform-docs::$MODULE has no .terraform-docs.yml and no README.md with <!-- BEGIN_TF_DOCS --> markers; cannot verify input/output docs. Add the markers (or a .terraform-docs.yml)."
            exit 1
          fi

  drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Check module-list drift
        # Fails the PR if the on-disk terraform-* dirs, the release-config
        # packages, and the versions manifest fall out of sync.
        run: python3 scripts/check_module_drift.py
